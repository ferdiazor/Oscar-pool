<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Oscars Family Pool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; }
        .gold { color: #fbbf24; }
    </style>
</head>
<body class="p-10">
    <h1 class="text-4xl font-bold gold text-center mb-10">OSCARS FAMILY POOL</h1>
    <div id="grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
    <script>
        const winners = [
            { year: 2025, title: "Anora", img: "https://image.tmdb.org/t/p/w500/98YvI09DscC76L7p09Vw6u0F7.jpg" },
            { year: 2024, title: "Oppenheimer", img: "https://image.tmdb.org/t/p/w500/8Gxv2Hbsfof1o99uY2p4JpSfsEA.jpg" },
            { year: 2023, title: "Everything Everywhere All at Once", img: "https://image.tmdb.org/t/p/w500/r7DuyYJ0Pd3ArGvCj2H9LqaGvYw.jpg" },
            { year: 2022, title: "CODA", img: "https://image.tmdb.org/t/p/w500/4Y0Y69298v3vN6Ie7r2R7oGv9Gj.jpg" },
            { year: 2021, title: "Nomadland", img: "https://image.tmdb.org/t/p/w500/66190.jpg" }
        ];
        const container = document.getElementById('grid');
        winners.forEach(m => {
            container.innerHTML += `<div class="bg-zinc-900 rounded-lg overflow-hidden border border-zinc-800">
                <img src="${m.img}" class="w-full h-64 object-cover">
                <div class="p-4"><p class="gold text-sm">${m.year}</p><h3 class="font-bold">${m.title}</h3></div>
            </div>`;
        });
    </script>
</body>
